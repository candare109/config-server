# logistics-dev.yml — dev profile overrides, merged on top of logistics.yml.
# Active when SPRING_PROFILES_ACTIVE=dev (default for local runs).

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 7000

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 86400000

# FIXED: two problems were here:
#   1. "eureka.server:" was an empty YAML key — parse error at startup.
#   2. The base logistics.yml defaultZone points to "eureka-server:8761" (Docker hostname).
#      That hostname does not resolve on localhost. Override it here so local runs work.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Use localhost URLs for local dev so Eureka dashboard links are clickable
    health-check-url: http://localhost:7000/actuator/health
    status-page-url:  http://localhost:7000/actuator/info
