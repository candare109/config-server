spring:
  application:
    name: eureka-server
  profiles:
    active: dev
  devtools:
    add-properties: false
  jackson:
    serialization:
      write-date-keys-as-timestamps: false

server:
  port: 8761
  compression:
    enabled: true
    min-response-size: 1024

eureka:
  instance:
    hostname: eureka-server
    preferIpAddress: false
  
  client:
    registerWithEureka: false
    fetchRegistry: false
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.netflix.eureka: INFO
